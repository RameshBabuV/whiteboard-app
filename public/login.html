<!DOCTYPE html>
<html>
<head>
  <title>Login | RS Academy Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<main class="login-card">
  <h1>RS Academy Board</h1>

  <form id="loginForm">
    <label>
      <span id="nameLabel">Name</span>
      <input id="name" name="name" autocomplete="name" required>
    </label>

    <label>
      Role
      <select id="role" name="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>
    </label>

    <label>
      Room
      <select id="room" name="room">
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="cpp">C & C++</option>
        <option value="hadoop">Hadoop</option>
      </select>
    </label>

    <label id="passwordField">
      Teacher Password
      <input id="password" name="password" type="password" autocomplete="current-password">
    </label>

    <button type="submit">Login</button>
    <p id="msg"></p>
  </form>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const form = document.getElementById("loginForm");
const roleInput = document.getElementById("role");
const roomInput = document.getElementById("room");
const passwordField = document.getElementById("passwordField");
const nameLabel = document.getElementById("nameLabel");
const msg = document.getElementById("msg");

roleInput.value = params.get("role") || "student";
roomInput.value = params.get("room") || "python";
togglePasswordField();

roleInput.addEventListener("change", togglePasswordField);

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  msg.textContent = "";

  const response = await fetch("/api/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: form.name.value,
      role: form.role.value,
      room: form.room.value,
      password: form.password.value
    })
  });

  const data = await response.json();

  if (!response.ok) {
    msg.textContent = data.error || "Login failed.";
    return;
  }

  window.location.href = data.redirectTo;
});

function togglePasswordField() {
  const isTeacher = roleInput.value === "teacher";
  passwordField.style.display = isTeacher ? "block" : "none";
  form.password.required = isTeacher;
  nameLabel.textContent = isTeacher ? "Teacher Username" : "Name";
  form.name.autocomplete = isTeacher ? "username" : "name";
}
</script>

</body>
</html>
