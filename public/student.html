<!DOCTYPE html>
<html>
<head>
  <title>Student Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="main">

  <div id="studentCallBar" class="call-bar call-hidden">
    <span id="callStatus" class="call-status">Voice off</span>
    <button id="studentMuteToggle" onclick="toggleStudentMute()" disabled title="Mute or unmute"><span class="tool-icon" aria-hidden="true">&#128263;</span><span>Unmute</span></button>
  </div>

  <canvas id="board"></canvas>

  <div id="chatContainer">
    <div id="chatBox"></div>

    <div id="chatInput">
      <input id="msg" placeholder="Ask doubt...">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
<script src="chat.js"></script>

</body>
</html>
