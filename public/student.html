<!DOCTYPE html>
<html>
<head>
  <title>Student Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="main">

  <div id="studentCallBar" class="call-bar call-hidden">
    <span id="callStatus" class="call-status">Voice off</span>
    <button id="studentMuteToggle" onclick="toggleStudentMute()" disabled title="Mute or unmute"><span class="tool-icon" aria-hidden="true">&#128263;</span><span>Unmute</span></button>
  </div>

  <div id="screenSharePanel" class="screen-share-panel screen-share-hidden">
    <button id="shareScreen" onclick="startScreenShare()" title="Share screen"><span class="tool-icon" aria-hidden="true">&#9635;</span><span>Share Screen</span></button>
    <button id="stopScreenShare" onclick="stopScreenShare(true)" disabled title="Stop screen share"><span class="tool-icon" aria-hidden="true">&#9633;</span><span>Stop Share</span></button>
    <span id="screenShareStatus">No screen shared</span>
  </div>

  <video id="screenShareVideo" class="screen-share-video" autoplay playsinline controls></video>

  <canvas id="board"></canvas>
  <div id="boardResizeHandle" class="board-resize-handle" title="Drag to resize whiteboard"></div>

  <div id="chatContainer">
    <div id="chatBox"></div>

    <div id="chatInput">
      <input id="msg" placeholder="Ask doubt...">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
<script src="chat.js"></script>

</body>
</html>
