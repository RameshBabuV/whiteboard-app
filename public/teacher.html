<!DOCTYPE html>
<html>
<head>
  <title>Teacher Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="main">

  <div id="toolbar">
    <input type="color" id="color">
    <button id="penTool" onclick="setTool('pen')">Pen</button>
    <button id="textTool" onclick="setTool('text')">Text</button>
    <button id="imageTool" onclick="setTool('image')">Image</button>
    <select id="fontFamily">
      <option value="Arial">Arial</option>
      <option value="Georgia">Georgia</option>
      <option value="Times New Roman">Times</option>
      <option value="Courier New">Courier</option>
    </select>
    <input type="number" id="fontSize" value="28" min="10" max="96">
    <button id="boldText" onclick="toggleTextStyle('bold')">B</button>
    <button id="italicText" onclick="toggleTextStyle('italic')">I</button>
    <button id="underlineText" onclick="toggleTextStyle('underline')">U</button>
    <select id="textAlign">
      <option value="left">Left</option>
      <option value="center">Center</option>
      <option value="right">Right</option>
    </select>
    <button onclick="addTextToBoard()">Add Text</button>
    <button onclick="chooseImage()">Choose Image</button>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="clearBoard()">Clear</button>
    <button onclick="saveBoard()">Save</button>
  </div>

  <canvas id="board"></canvas>
  <textarea id="boardTextEditor" placeholder="Paste or type here..."></textarea>

  <div id="chatContainer">
    <div id="chatBox"></div>

    <div id="chatInput">
      <input id="msg" placeholder="Type message...">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
<script src="chat.js"></script>

</body>
</html>
