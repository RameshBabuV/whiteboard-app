<!DOCTYPE html>
<html>
<head>
  <title>Teacher Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="main">

  <div id="toolbar">
    <div class="toolbar-row">
      <input type="color" id="color">
      <button id="penTool" onclick="setTool('pen')">Pen</button>
      <button id="textTool" onclick="setTool('text')">Text</button>
      <button id="imageTool" onclick="setTool('image')">Image</button>
      <button id="tableTool" onclick="setTool('table')">Table</button>
      <button id="rectangleTool" onclick="setShapeTool('rectangle')">Rectangle</button>
      <button id="circleTool" onclick="setShapeTool('circle')">Circle</button>
      <button id="triangleTool" onclick="setShapeTool('triangle')">Triangle</button>
      <button id="undoBoard" onclick="undoBoard()" disabled>Undo</button>
      <button id="redoBoard" onclick="redoBoard()" disabled>Redo</button>
      <button onclick="clearBoard()">Clear</button>
      <button onclick="saveBoard()">Save</button>
    </div>

    <div class="toolbar-row">
      <select id="fontFamily">
        <option value="Arial">Arial</option>
        <option value="Arial Black">Arial Black</option>
        <option value="Avenir">Avenir</option>
        <option value="Avenir Next">Avenir Next</option>
        <option value="Bahnschrift">Bahnschrift</option>
        <option value="Baskerville">Baskerville</option>
        <option value="Brush Script MT">Brush Script</option>
        <option value="Calibri">Calibri</option>
        <option value="Cambria">Cambria</option>
        <option value="Candara">Candara</option>
        <option value="Century Gothic">Century Gothic</option>
        <option value="Comic Sans MS">Comic Sans</option>
        <option value="Consolas">Consolas</option>
        <option value="Copperplate">Copperplate</option>
        <option value="Courier New">Courier New</option>
        <option value="Didot">Didot</option>
        <option value="Futura">Futura</option>
        <option value="Georgia">Georgia</option>
        <option value="Gill Sans">Gill Sans</option>
        <option value="Garamond">Garamond</option>
        <option value="Geneva">Geneva</option>
        <option value="Helvetica">Helvetica</option>
        <option value="Helvetica Neue">Helvetica Neue</option>
        <option value="Impact">Impact</option>
        <option value="Lucida Console">Lucida Console</option>
        <option value="Lucida Grande">Lucida Grande</option>
        <option value="Lucida Sans Unicode">Lucida Sans Unicode</option>
        <option value="Menlo">Menlo</option>
        <option value="Monaco">Monaco</option>
        <option value="Optima">Optima</option>
        <option value="Palatino">Palatino</option>
        <option value="Papyrus">Papyrus</option>
        <option value="Segoe UI">Segoe UI</option>
        <option value="Tahoma">Tahoma</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Trebuchet MS">Trebuchet MS</option>
        <option value="Verdana">Verdana</option>
      </select>
      <input type="number" id="fontSize" value="28" min="10" max="96">
      <button id="boldText" onclick="toggleTextStyle('bold')">B</button>
      <button id="italicText" onclick="toggleTextStyle('italic')">I</button>
      <button id="underlineText" onclick="toggleTextStyle('underline')">U</button>
      <select id="textAlign">
        <option value="left">Left</option>
        <option value="center">Center</option>
        <option value="right">Right</option>
      </select>
      <button onclick="addTextToBoard()">Add Text</button>
      <button onclick="chooseImage()">Choose Image</button>
      <input type="file" id="imageInput" accept="image/*">
      <input type="number" id="tableRows" value="3" min="1" max="20" title="Rows">
      <input type="number" id="tableCols" value="3" min="1" max="20" title="Columns">
      <button onclick="addTableToBoard()">Insert Table</button>
    </div>
  </div>

  <canvas id="board"></canvas>
  <textarea id="boardTextEditor" placeholder="Paste or type here..."></textarea>

  <div id="chatContainer">
    <div id="chatBox"></div>

    <div id="chatInput">
      <input id="msg" placeholder="Type message...">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
<script src="chat.js"></script>

</body>
</html>
